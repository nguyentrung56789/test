<script>
(async function(){

  const supabase = window.supabase.createClient(
    window.getConfig("url"),
    window.getConfig("role") || window.getConfig("anon"),
    {
      global:{ headers:{ "x-internal-key": window.getInternalKey() } }
    }
  );

  const map = L.map("map", { zoomControl:false }).setView([20.85,106.68], 12);

  L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",{
    maxZoom:19
  }).addTo(map);

  function toNumber(v, fallback = 0){
    if (v === null || v === undefined || v === "") return fallback;
    const n = Number(v);
    return Number.isFinite(n) ? n : fallback;
  }

  function normalizePhone(v){
    return String(v || "").replace(/\D/g, "").trim();
  }

  function getColor(row){
    const hasPhone = normalizePhone(row.dien_thoai) !== "";
    const checkinMonth = toNumber(row.checkin_thang, 0);

    if (checkinMonth > 0) return "purple";
    if (hasPhone) return "orange";
    return "red";
  }

  function getMarkerClass(color){
    if (color === "purple") return "mk-purple";
    if (color === "orange") return "mk-orange";
    return "mk-red";
  }

  function getMarkerLabel(row, index){
    const n = toNumber(row.checkin_thang, 0);
    if (n > 0) return n;
    return index + 1;
  }

  async function fetchAllRows() {
    const pageSize = 1000;
    let from = 0;
    let allRows = [];

    while (true) {
      const { data, error } = await supabase
        .from("nv_checkin_khach_hang")
        .select("lat,lng,ten_kh,ma_kh,dia_chi,dien_thoai,ma_nv,checkin_thang")
        .range(from, from + pageSize - 1);

      if (error) {
        console.error("Lỗi Supabase:", error);
        alert("Lỗi lấy dữ liệu Supabase: " + (error.message || "Không rõ lỗi"));
        return [];
      }

      if (!data || data.length === 0) break;

      allRows = allRows.concat(data);

      if (data.length < pageSize) break;
      from += pageSize;
    }

    return allRows;
  }

  const data = await fetchAllRows();
  console.log("Tổng rows lấy được:", data.length);
  console.log("Mẫu row đầu:", data[0]);

  let points = [];
  let markers = [];

  data.forEach((r,i)=>{
    const lat = parseFloat(String(r.lat ?? "").trim());
    const lng = parseFloat(String(r.lng ?? "").trim());

    if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
      console.log("Bỏ row do lat/lng lỗi:", r);
      return;
    }

    const color = getColor(r);
    const markerClass = getMarkerClass(color);
    const label = getMarkerLabel(r, i);

    const icon = L.divIcon({
      html:`<div class="${markerClass}">${label}</div>`,
      iconSize:[26,26],
      iconAnchor:[13,13],
      className:""
    });

    const mk = L.marker([lat,lng],{icon}).bindPopup(`
      <b>${r.ten_kh || "Không tên"}</b><br>
      Mã KH: ${r.ma_kh || ""}<br>
      Địa chỉ: ${r.dia_chi || ""}<br>
      ĐT: ${r.dien_thoai || ""}<br>
      NV: ${r.ma_nv || ""}<br>
      Checkin tháng: <b>${toNumber(r.checkin_thang, 0)}</b>
    `);

    mk.addTo(map);

    points.push({
      stt: i + 1,
      lat,
      lng,
      marker: mk,
      color,
      nv: String(r.ma_nv || "").trim(),
      row: r
    });

    markers.push(mk);
  });

  console.log("Số marker vẽ được:", markers.length);

  if(markers.length){
    const grp = L.featureGroup(markers);
    map.fitBounds(grp.getBounds(),{padding:[50,50]});
  }

  let userMarker = null;
  let userCircle = null;
  let lastLat = null;
  let lastLng = null;

  function showGPS(lat,lng){
    lastLat = lat;
    lastLng = lng;

    if(userMarker){
      userMarker.setLatLng([lat,lng]);
    } else {
      userMarker = L.circleMarker([lat,lng],{
        radius:8,
        color:"#b91c1c",
        fillColor:"#ef4444",
        fillOpacity:1,
        weight:3
      }).addTo(map);
    }

    if(userCircle){
      userCircle.setLatLng([lat,lng]);
    } else {
      userCircle = L.circle([lat,lng],{
        radius:100,
        color:"#f87171",
        fillColor:"#fecaca",
        fillOpacity:0.3,
        weight:1
      }).addTo(map);
    }
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      showGPS(lat,lng);
      map.setView([lat,lng],18);
    });

    navigator.geolocation.watchPosition(
      pos=> showGPS(pos.coords.latitude, pos.coords.longitude),
      undefined,
      { enableHighAccuracy:true, timeout:3000, maximumAge:0 }
    );
  }

  document.getElementById("gpsBtn").onclick = ()=>{
    if(lastLat && lastLng){
      map.setView([lastLat,lastLng],18);
    }
  };

  const nvFilter = document.getElementById("nvFilter");
  const nvSet = new Set();

  points.forEach(p=>{
    if(!p.nv) return;
    p.nv.split("_").forEach(nv => {
      const x = nv.trim();
      if (x) nvSet.add(x);
    });
  });

  [...nvSet].sort().forEach(nv=>{
    const opt=document.createElement("option");
    opt.value=nv;
    opt.textContent=nv;
    nvFilter.appendChild(opt);
  });

  const colorFilter = document.getElementById("colorFilter");
  const searchBox   = document.getElementById("searchBox");

  function applyFilter(){
    const fColor = colorFilter.value;
    const fNV    = nvFilter.value;
    const q      = searchBox.value.trim().toLowerCase();

    points.forEach(p=>{
      const r = p.row;
      let ok = true;

      if(fColor && p.color !== fColor) ok = false;

      if(fNV){
        const nvList = (p.nv || "").split("_").map(x=>x.trim()).filter(Boolean);
        if(!nvList.includes(fNV)) ok = false;
      }

      if(q){
        const text = `
          ${r.ma_kh || ""}
          ${r.ten_kh || ""}
          ${r.dia_chi || ""}
          ${r.dien_thoai || ""}
          ${r.ma_nv || ""}
        `.toLowerCase();

        if(!text.includes(q)) ok = false;
      }

      if(ok){
        if(!map.hasLayer(p.marker)) p.marker.addTo(map);
      }else{
        if(map.hasLayer(p.marker)) map.removeLayer(p.marker);
      }
    });
  }

  colorFilter.onchange = applyFilter;
  nvFilter.onchange    = applyFilter;
  searchBox.oninput    = applyFilter;

})();
</script>
